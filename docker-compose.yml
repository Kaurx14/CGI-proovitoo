services:

  postgres:
    image: postgres:16
    container_name: restaurant_postgres
    environment:
      POSTGRES_DB: restaurant
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d restaurant" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: restaurant_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/restaurant
      DB_USERNAME: user
      DB_PASSWORD: password
    
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend


volumes:
  postgres_data: